<!doctype html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FaceReward | AI Recognition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="glass-bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <header class="top-nav glass-nav">
    <div class="nav-container">
      <a href="/" class="logo-link">
        <span class="logo-text">Face<span class="gradient-text">Reward</span></span>
      </a>

      <nav class="nav-links">
        <a href="/" class="nav-item">Home</a>
        <a href="/dashboard" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item" onclick="openHelp()">Help</a>
      </nav>
    </div>
  </header>

  <main class="main-wrapper">
    {% block content %}{% endblock %}
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Help Modal -->
  <div class="modal" id="helpModal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3>Quick Guide</h3>
        <button class="close-btn" onclick="closeHelp()"><i class="ph ph-x"></i></button>
      </div>
      <div class="steps-grid">
        <div class="step-card">
          <i class="ph ph-camera step-icon"></i>
          <div class="step-info">
            <h4>01 Register</h4>
            <p>Capture face samples in good lighting. Move slightly for better accuracy.</p>
          </div>
        </div>
        <div class="step-card">
          <i class="ph ph-brain step-icon"></i>
          <div class="step-info">
            <h4>02 Train</h4>
            <p>Process registered faces to build your custom AI model.</p>
          </div>
        </div>
        <div class="step-card">
          <i class="ph ph-fingerprint step-icon"></i>
          <div class="step-info">
            <h4>03 Verify</h4>
            <p>Test the model for instant identity confirmation.</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="closeHelp()">Got it</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>
    function openHelp() { document.getElementById('helpModal').classList.add('show'); }
    function closeHelp() { document.getElementById('helpModal').classList.remove('show'); }
  </script>
</body>

</html>
